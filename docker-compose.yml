services:
  db:
    image: postgres:16
    container_name: edumind_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=edumind_db
      - POSTGRES_USER=edumind_user
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"

volumes:
  postgres_data: